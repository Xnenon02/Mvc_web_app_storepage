#cloud-config
package_update: true
package_upgrade: true

packages:
  - nginx

users:
  - default
  - name: deployer
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - SSH_PUBLIC_KEY_HÄR

write_files:
  - path: /etc/systemd/system/techstore.service
    permissions: '0644'
    content: |
      [Unit]
      Description=TechStore ASP.NET Core App
      After=network.target

      [Service]
      WorkingDirectory=/var/www/techstore/current
      ExecStart=/usr/bin/dotnet /var/www/techstore/current/MyMvcApp.dll
      Restart=always
      RestartSec=10
      KillSignal=SIGINT
      SyslogIdentifier=techstore
      User=deployer
      Environment=ASPNETCORE_ENVIRONMENT=Production
      Environment=ASPNETCORE_URLS=http://localhost:5000

      [Install]
      WantedBy=multi-user.target

  - path: /etc/nginx/sites-available/techstore
    permissions: '0644'
    content: |
      server {
          listen 80;
          server_name _;

          location / {
              proxy_pass         http://127.0.0.1:5000;
              proxy_http_version 1.1;
              proxy_set_header   Upgrade $http_upgrade;
              proxy_set_header   Connection keep-alive;
              proxy_set_header   Host $host;
              proxy_cache_bypass $http_upgrade;
              proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header   X-Forwarded-Proto $scheme;
          }
      }

runcmd:
  - mkdir -p /var/www/techstore/releases
  - mkdir -p /var/www/techstore/current
  - chown -R deployer:deployer /var/www/techstore
  - rm -f /etc/nginx/sites-enabled/default
  - ln -s /etc/nginx/sites-available/techstore /etc/nginx/sites-enabled/techstore
  - systemctl daemon-reload
  - systemctl enable nginx
  - systemctl restart nginx
  - systemctl enable techstore.service